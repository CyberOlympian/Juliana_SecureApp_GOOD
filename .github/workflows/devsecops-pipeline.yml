name: DevSecOps Advanced Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sast-and-sca:
    name: Code & Dependency Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scan Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit pip-audit semgrep

      - name: Run Semgrep (Custom Code Security)
        run: semgrep ci --config .semgrep.yml --json > semgrep-results.json || true

      - name: Run Bandit (Python SAST)
        run: bandit -r app/ -f json -o bandit-results.json || true

      - name: Run pip-audit (Software Composition Analysis)
        run: pip-audit -r requirements.txt -f json -o pip-audit-results.json || true

      - name: Enforce Security Gates (Fail on High/Critical)
        run: |
          bandit -r app/ -ll -ii
          pip-audit -r requirements.txt

      - name: Upload Source Security Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-security-reports
          path: |
            semgrep-results.json
            bandit-results.json
            pip-audit-results.json

  build-scan-and-promote:
    name: Image Build, Scan & Promote
    needs: sast-and-sca
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Image
        run: |
          docker build -t secure-app:${{ github.sha }} \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --load .

      - name: Run Trivy Container Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app:${{ github.sha }}'
          format: 'json'
          output: 'trivy-container-report.json'
          exit-code: '1' # Fails pipeline on finding vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM (CycloneDX format)
        uses: anchore/sbom-action@v0
        with:
          image: 'secure-app:${{ github.sha }}'
          format: cyclonedx-json
          output-file: 'sbom-cyclonedx.json'

      - name: Upload Container Security & SBOM Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-artifacts
          path: |
            trivy-container-report.json
            sbom-cyclonedx.json

      - name: Promote to Trusted Build
        run: |
          # The pipeline only reaches this step if Trivy exits with code 0.
          # Here we officially label the artifact as "trusted".
          docker tag secure-app:${{ github.sha }} secure-app:trusted-${{ github.sha }}
          
          echo "==== TRUSTED BUILD RECEIPT ====" > build-provenance.txt
          echo "Commit SHA: ${{ github.sha }}" >> build-provenance.txt
          echo "Status: PASSED all SAST, SCA, and Container checks" >> build-provenance.txt
          echo "Artifact: secure-app:trusted-${{ github.sha }}" >> build-provenance.txt

      - name: Upload Build Provenance
        uses: actions/upload-artifact@v4
        with:
          name: build-provenance
          path: build-provenance.txt
